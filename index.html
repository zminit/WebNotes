<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WebNotes：可交互的动态网页笔记。" />
    <title>WebNotes · 互动知识笔记</title>
    <style>
      :root {
        --ink: #18223a;
        --muted: #5f6d85;
        --paper: #f7f9ff;
        --card: rgba(255, 255, 255, .78);
        --line: rgba(35, 57, 104, .12);
        --blue: #3d63f5;
        --cyan: #39b9d4;
        --shadow: 0 20px 55px rgba(42, 61, 120, .13);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        background: var(--paper);
      }

      .orb {
        position: fixed;
        z-index: -1;
        width: 32rem;
        height: 32rem;
        border-radius: 50%;
        filter: blur(2px);
        opacity: .5;
      }
      .orb-one { top: -13rem; right: -9rem; background: #bed5ff; }
      .orb-two { bottom: -16rem; left: -12rem; background: #c8f2e8; }

      .page { width: min(1120px, calc(100% - 40px)); margin: 0 auto; }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 0;
      }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 750; letter-spacing: -.03em; }
      .brand-mark {
        display: grid;
        width: 32px; height: 32px;
        place-items: center;
        color: white;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--blue), var(--cyan));
        box-shadow: 0 7px 16px rgba(61, 99, 245, .25);
      }
      nav { display: flex; gap: 20px; font-size: .92rem; }
      nav a { color: var(--muted); text-decoration: none; }
      nav a:hover { color: var(--blue); }

      .hero { padding: 78px 0 86px; text-align: center; }
      .eyebrow {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 7px 12px;
        color: #3150c6;
        font-size: .82rem;
        font-weight: 650;
        background: rgba(222, 230, 255, .78);
        border: 1px solid rgba(82, 111, 222, .16);
        border-radius: 100px;
      }
      h1 { max-width: 780px; margin: 18px auto; font-size: clamp(2.55rem, 6vw, 5.1rem); line-height: 1.07; letter-spacing: -.065em; }
      h1 em { color: var(--blue); font-style: normal; }
      .intro { max-width: 580px; margin: 0 auto; color: var(--muted); font-size: 1.08rem; line-height: 1.8; }
      .actions { display: flex; justify-content: center; gap: 12px; margin-top: 30px; }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        color: white;
        font-weight: 650;
        text-decoration: none;
        background: var(--blue);
        border: 1px solid var(--blue);
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(61, 99, 245, .2);
        transition: transform .2s, box-shadow .2s;
      }
      .button:hover { transform: translateY(-2px); box-shadow: 0 14px 25px rgba(61, 99, 245, .28); }
      .button.secondary { color: var(--ink); background: rgba(255, 255, 255, .58); border-color: var(--line); box-shadow: none; }

      .section { padding: 44px 0 76px; }
      .section-heading { display: flex; justify-content: space-between; align-items: end; margin-bottom: 20px; }
      h2 { margin: 0; font-size: 1.55rem; letter-spacing: -.04em; }
      .section-heading p { margin: 0; color: var(--muted); font-size: .92rem; }
      .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .card {
        min-height: 200px;
        padding: 24px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }
      .card-icon { font-size: 1.55rem; }
      .card h3 { margin: 22px 0 8px; font-size: 1.08rem; }
      .card p { margin: 0; color: var(--muted); font-size: .92rem; line-height: 1.7; }
      .empty-note { padding: 28px; text-align: center; color: var(--muted); border: 1px dashed rgba(61, 99, 245, .3); border-radius: 18px; }
      footer { padding: 26px 0 34px; color: var(--muted); font-size: .84rem; border-top: 1px solid var(--line); }

      @media (max-width: 720px) {
        .page { width: min(100% - 28px, 1120px); }
        nav { display: none; }
        .hero { padding: 56px 0 54px; }
        .actions { flex-direction: column; padding: 0 24px; }
        .cards { grid-template-columns: 1fr; }
        .section-heading { display: block; }
        .section-heading p { margin-top: 8px; }
      }
    </style>
  </head>
  <body>
    <div class="orb orb-one"></div>
    <div class="orb orb-two"></div>
    <div class="page">
      <header>
        <div class="brand"><span class="brand-mark">W</span> WebNotes</div>
        <nav aria-label="主导航">
          <a href="#about">关于项目</a>
          <a href="#notes">笔记空间</a>
        </nav>
      </header>

      <main>
        <section class="hero" id="about">
          <span class="eyebrow">✦ 从好奇开始学习</span>
          <h1>把知识变成<br /><em>可以亲手探索</em>的笔记</h1>
          <p class="intro">WebNotes 是一个面向浏览器的互动知识花园。这里会收集技术、概念与灵感，并用网页让它们更直观、更好玩。</p>
          <div class="actions">
            <a class="button" href="#notes">浏览笔记</a>
            <a class="button secondary" href="https://github.com/" target="_blank" rel="noreferrer">查看项目</a>
          </div>
        </section>

        <section class="section" id="notes">
          <div class="section-heading">
            <h2>你会在这里发现</h2>
            <p>第一篇互动笔记正在准备中</p>
          </div>
          <div class="cards">
            <article class="card"><div class="card-icon">◌</div><h3>技术拆解</h3><p>用简洁的文字、图示和小实验理解复杂的工程概念。</p></article>
            <article class="card"><div class="card-icon">⌘</div><h3>动手实验</h3><p>在页面中调整参数、观察变化，让理解不止停留在阅读。</p></article>
            <article class="card"><div class="card-icon">✳</div><h3>持续生长</h3><p>每一篇笔记都是独立的小空间，也会和其他想法彼此连接。</p></article>
          </div>
          <div class="empty-note" style="margin-top:16px">新的互动笔记即将添加到这里。</div>
        </section>
      </main>
      <footer>© <span id="year"></span> WebNotes · 为持续学习而建</footer>
    </div>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  </body>
</html>
